<!DOCTYPE html>
<html>
<head>
    <title>Marksheet Table</title>
</head>
<body>

<table border="1" align="center">
    <center>student form</center>
    <form>
    <th>form</th>
    <tr>
        <td>name</td>
        <td><input type="text" name="username"placeholder="enter your name" required="true"/></td>
    </tr>
    <tr>
        <td> father name</td>
        <td><input type="text" name="father name"placeholder="enter your father name" required="true"/></td>
    </tr>
    <tr>
        <td> mother name</td>
        <td><input type="text" name="mother name"placeholder="enter your mother name" required="true"/></td>
    </tr>
    <tr>
        <td> contact number</td>
        <td><input type="number" name="contact number"placeholder="enter your contact number" required="true"/></td>
    </tr>
    <tr>
        <td>course</td>
        <td><select name="course" id="course">
             <option value="seleect">select</option>
            <option value="BCA">BCA</option>
            <option value="BBA">BBA</option>
            <option value="BA-LLB">BA-LLB</option>
            <option value="MCA">MCA</option>
            <option value="MBA">MBA</option>
            <option value="LLB">LLB</option>
        </td>
    </tr>
    <tr>
        <td>tabel <for="image">upload yor image</tabel></td>
         <td><input type="file"accept="image/*"required></td>
    </tr>   
    <tr>
        <td>address</td>
        <td><input  type="address" name="address"placeholder="enter your address" required="true"/></td>
    </tr>
    <tr>
        <td>email</td>
        <td><input  type="email" name="email id"placeholder="enter your email" required="true"/></td>
    </tr>
    <tr>
        <td>gander</td>
        <td><input  type="radio" name="gander"value="male">male

        <input  type="radio" name="gander"value="female">female
        <input  type="radio" name="gander"value="other">other
        </td>
    </tr>
    <tr>
        <td>qualification</td>
        <td>
            <select name="qualification" id="qualification">
             <option value="select">select</option>
            <option value="10th">10th</option>
            <option value="12th">12th</option>
            <option value="gradution">gradution</option>
        </td>
    </tr>
    <tr>
        <td>file</td>
        <td><input type="file" name="file"required="true" id="file"  accept="image/"></td>
    </tr>
    <tr>
        <td><input type="submit" name="submit" id="submit" placeholder="submit"></td>
        <td><input type="reset" name="reset" id="reset" placeholder="clear form"></td>
    </tr>
    </form>
</table>

</body>
</html>
